<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Soal Bahasa Inggris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .option-btn { transition: all 0.2s ease; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .disabled { opacity: 0.7; cursor: not-allowed; pointer-events: none; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased py-8 px-4 sm:px-6 lg:px-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10 bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-700 mb-3">English Practice Test</h1>
            <p class="text-gray-600 mb-4">Kerjakan 30 soal di bawah ini. Pembahasan akan langsung muncul setelah kamu memilih jawaban.</p>
            <div class="inline-flex items-center justify-center space-x-4 text-sm font-medium text-gray-500">
                <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-blue-500 mr-2"></span> 30 Soal</span>
                <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span> Sistem Nilai</span>
            </div>
        </header>

        <div id="quiz-container">
            <!-- Soal-soal akan dimuat di sini oleh JavaScript -->
        </div>

        <!-- Bagian Penilaian -->
        <div class="mt-12 mb-20 text-center">
            <button id="finish-btn" onclick="showScore()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transition transform hover:-translate-y-1 text-lg hidden">
                Selesai & Lihat Nilai
            </button>
        </div>

        <!-- Modal Nilai -->
        <div id="score-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center transform scale-95 transition-transform duration-300" id="score-card">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Hasil Latihan Kamu</h2>
                <p class="text-gray-500 mb-6">Berikut adalah skor akhir dari jawabanmu.</p>
                
                <div class="text-6xl font-extrabold text-blue-600 mb-2" id="final-score-text">0</div>
                <div class="text-lg font-semibold text-gray-700 mb-6" id="final-fraction">0 / 30 Benar</div>
                
                <div class="w-full bg-gray-200 rounded-full h-4 mb-6">
                    <div class="bg-blue-600 h-4 rounded-full transition-all duration-1000" id="score-bar" style="width: 0%"></div>
                </div>

                <button onclick="closeModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-3 px-6 rounded-xl transition">
                    Tutup & Cek Kembali Jawaban
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data Soal (30 Soal berdasarkan Part 1-4)
        const questionsData = [
            // PART 1: The Global Journey of Tea (Questions 1-8)
            { id: 1, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "Tea has a long history that <strong>(1) ______</strong> back thousands of years to ancient China.", question: "Choose the correct word for blank (1):", options: [{key:"A",text:"dates"},{key:"B",text:"goes"},{key:"C",text:"tracks"},{key:"D",text:"points"}], correctAnswer: "A", discussion: "Frasa 'dates back' adalah collocation yang tepat untuk menyatakan 'berasal dari masa lampau'." },
            { id: 2, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "Initially, it was consumed primarily for medicinal purposes before becoming a popular daily <strong>(2) ______</strong>.", question: "Choose the correct word for blank (2):", options: [{key:"A",text:"snack"},{key:"B",text:"beverage"},{key:"C",text:"liquid"},{key:"D",text:"meal"}], correctAnswer: "B", discussion: "'Beverage' berarti minuman, yang sangat tepat untuk mendeskripsikan teh." },
            { id: 3, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "As trade routes expanded, tea <strong>(3) ______</strong> across Asia and eventually reached Europe.", question: "Choose the correct word for blank (3):", options: [{key:"A",text:"walked"},{key:"B",text:"flew"},{key:"C",text:"spread"},{key:"D",text:"grew"}], correctAnswer: "C", discussion: "'Spread' (menyebar) digunakan untuk mendeskripsikan sesuatu yang meluas jangkauannya, seperti popularitas teh." },
            { id: 4, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "In Britain, it <strong>(4) ______</strong> a significant role in social gatherings.", question: "Choose the correct word for blank (4):", options: [{key:"A",text:"played"},{key:"B",text:"made"},{key:"C",text:"took"},{key:"D",text:"did"}], correctAnswer: "A", discussion: "Collocation yang benar adalah 'played a role' (memainkan peran)." },
            { id: 5, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "Today, tea is <strong>(5) ______</strong> in many different climates around the world.", question: "Choose the correct word for blank (5):", options: [{key:"A",text:"manufactured"},{key:"B",text:"built"},{key:"C",text:"cultivated"},{key:"D",text:"invented"}], correctAnswer: "C", discussion: "'Cultivated' (dibudidayakan) adalah kata kerja yang tepat untuk tanaman." },
            { id: 6, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "There is a wide <strong>(6) ______</strong> of tea types, from green to black.", question: "Choose the correct word for blank (6):", options: [{key:"A",text:"variety"},{key:"B",text:"amount"},{key:"C",text:"number"},{key:"D",text:"size"}], correctAnswer: "A", discussion: "'A wide variety of' berarti 'berbagai macam', cocok untuk jenis teh." },
            { id: 7, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "To get the best flavor, tea leaves must be <strong>(7) ______</strong> in hot water for a few minutes.", question: "Choose the correct word for blank (7):", options: [{key:"A",text:"boiled"},{key:"B",text:"steeped"},{key:"C",text:"cooked"},{key:"D",text:"burned"}], correctAnswer: "B", discussion: "'Steeped' (diseduh) adalah istilah spesifik yang digunakan untuk teh." },
            { id: 8, part: "Part 1: Vocabulary in Context", passageTitle: "The Global Journey of Tea", passageText: "In many cultures, serving tea is viewed as a symbol of <strong>(8) ______</strong>.", question: "Choose the correct word for blank (8):", options: [{key:"A",text:"hostility"},{key:"B",text:"hospitality"},{key:"C",text:"anger"},{key:"D",text:"wealth"}], correctAnswer: "B", discussion: "'Hospitality' (keramahtamahan) adalah nilai budaya yang sering dikaitkan dengan menyajikan teh." },

            // PART 2: The Park in the Sky (Questions 9-15)
            { id: 9, part: "Part 2: Short Answer Cloze", passageTitle: "The Park in the Sky", passageText: "An old abandoned railway line was <strong>(9) ______</strong> into a beautiful elevated park.", question: "Choose the correct word for blank (9):", options: [{key:"A",text:"transformed"},{key:"B",text:"destroyed"},{key:"C",text:"moved"},{key:"D",text:"sold"}], correctAnswer: "A", discussion: "'Transformed' (diubah) tepat menggambarkan perubahan dari rel tua menjadi taman." },
            { id: 10, part: "Part 2: Short Answer Cloze", passageTitle: "The Park in the Sky", passageText: "This <strong>(10) ______</strong> park offers a unique view of the city streets below.", question: "Choose the correct word for blank (10):", options: [{key:"A",text:"underground"},{key:"B",text:"elevated"},{key:"C",text:"hidden"},{key:"D",text:"temporary"}], correctAnswer: "B", discussion: "Karena dibangun di atas rel kereta (in the sky), 'elevated' (melayang/di atas tanah) adalah kata sifat yang benar." },
            { id: 11, part: "Part 2: Short Answer Cloze", passageTitle: "The Park in the Sky", passageText: "It has quickly become a favorite destination for both tourists and local <strong>(11) ______</strong>.", question: "Choose the correct word for blank (11):", options: [{key:"A",text:"animals"},{key:"B",text:"residents"},{key:"C",text:"vehicles"},{key:"D",text:"buildings"}], correctAnswer: "B", discussion: "'Residents' (penduduk lokal) sering dipasangkan dengan turis saat membicarakan pengunjung suatu tempat." },
            { id: 12, part: "Part 2: Short Answer Cloze", passageTitle: "The Park in the Sky", passageText: "The project has greatly increased the urban <strong>(12) ______</strong> by introducing new plants.", question: "Choose the correct word for blank (12):", options: [{key:"A",text:"noise"},{key:"B",text:"pollution"},{key:"C",text:"biodiversity"},{key:"D",text:"traffic"}], correctAnswer: "C", discussion: "'Biodiversity' (keanekaragaman hayati) meningkat karena adanya penambahan tanaman baru." },
            { id: 13, part: "Part 2: Short Answer Cloze", passageTitle: "The Park in the Sky", passageText: "It serves as a strong <strong>(13) ______</strong> space where people can gather.", question: "Choose the correct word for blank (13):", options: [{key:"A",text:"community"},{key:"B",text:"private"},{key:"C",text:"commercial"},{key:"D",text:"industrial"}], correctAnswer: "A", discussion: "Tempat berkumpulnya orang-orang disebut sebagai ruang 'community' (komunitas/umum)." },
            { id: 14, part: "Part 2: Short Answer Cloze", passageTitle: "The Park in the Sky", passageText: "Many people enjoy <strong>(14) ______</strong> activities like walking and jogging here.", question: "Choose the correct word for blank (14):", options: [{key:"A",text:"dangerous"},{key:"B",text:"recreational"},{key:"C",text:"boring"},{key:"D",text:"academic"}], correctAnswer: "B", discussion: "Berjalan dan jogging adalah contoh aktivitas 'recreational' (rekreasi)." },
            { id: 15, part: "Part 2: Short Answer Cloze", passageTitle: "The Park in the Sky", passageText: "The innovative <strong>(15) ______</strong> design integrates nature seamlessly with concrete.", question: "Choose the correct word for blank (15):", options: [{key:"A",text:"landscape"},{key:"B",text:"interior"},{key:"C",text:"fashion"},{key:"D",text:"software"}], correctAnswer: "A", discussion: "'Landscape design' (desain lanskap/tata ruang luar) berkaitan dengan integrasi alam dan struktur buatan." },

            // PART 3: The Rise of Eco-Friendly Buildings (Questions 16-22)
            { id: 16, part: "Part 3: Word Formation", passageTitle: "The Rise of Eco-Friendly Buildings", passageText: "Modern architecture places a heavy emphasis on environmental <strong>(16) sustain...</strong>.", question: "Choose the correct form of the word 'sustain':", options: [{key:"A",text:"sustains"},{key:"B",text:"sustainability"},{key:"C",text:"sustainable"},{key:"D",text:"sustained"}], correctAnswer: "B", discussion: "Kita membutuhkan kata benda (noun) setelah kata sifat 'environmental'. Bentuk noun dari sustain adalah 'sustainability' (keberlanjutan)." },
            { id: 17, part: "Part 3: Word Formation", passageTitle: "The Rise of Eco-Friendly Buildings", passageText: "The goal is to reduce carbon <strong>(17) emit...</strong>.", question: "Choose the correct form of the word 'emit':", options: [{key:"A",text:"emissions"},{key:"B",text:"emitters"},{key:"C",text:"emitting"},{key:"D",text:"emits"}], correctAnswer: "A", discussion: "Kata benda yang berarti 'gas buang' adalah 'emissions'." },
            { id: 18, part: "Part 3: Word Formation", passageTitle: "The Rise of Eco-Friendly Buildings", passageText: "These buildings often utilize <strong>(18) renew...</strong> energy sources like solar panels.", question: "Choose the correct form of the word 'renew':", options: [{key:"A",text:"renews"},{key:"B",text:"renewal"},{key:"C",text:"renewing"},{key:"D",text:"renewable"}], correctAnswer: "D", discussion: "Kita butuh kata sifat (adjective) untuk menjelaskan 'energy sources'. Bentuk yang tepat adalah 'renewable' (dapat diperbarui)." },
            { id: 19, part: "Part 3: Word Formation", passageTitle: "The Rise of Eco-Friendly Buildings", passageText: "Energy <strong>(19) efficient...</strong> is achieved through better insulation.", question: "Choose the correct form of the word 'efficient':", options: [{key:"A",text:"efficiently"},{key:"B",text:"efficiencies"},{key:"C",text:"efficiency"},{key:"D",text:"efficient"}], correctAnswer: "C", discussion: "Subjek kalimat membutuhkan kata benda abstrak, yaitu 'efficiency' (efisiensi)." },
            { id: 20, part: "Part 3: Word Formation", passageTitle: "The Rise of Eco-Friendly Buildings", passageText: "The <strong>(20) construct...</strong> phase also aims to minimize waste.", question: "Choose the correct form of the word 'construct':", options: [{key:"A",text:"constructor"},{key:"B",text:"construction"},{key:"C",text:"constructive"},{key:"D",text:"constructing"}], correctAnswer: "B", discussion: "Frasa kata benda yang merujuk pada tahap pembangunan adalah 'construction phase'." },
            { id: 21, part: "Part 3: Word Formation", passageTitle: "The Rise of Eco-Friendly Buildings", passageText: "Builders use recycled <strong>(21) material...</strong> whenever possible.", question: "Choose the correct form of the word 'material':", options: [{key:"A",text:"materials"},{key:"B",text:"materialize"},{key:"C",text:"materialism"},{key:"D",text:"materially"}], correctAnswer: "A", discussion: "Kata benda jamak (plural noun) dibutuhkan di sini karena merujuk pada berbagai bahan bangunan: 'materials'." },
            { id: 22, part: "Part 3: Word Formation", passageTitle: "The Rise of Eco-Friendly Buildings", passageText: "Overall, this reduces the ecological <strong>(22) foot...</strong> of urban areas.", question: "Choose the correct word combining with 'foot':", options: [{key:"A",text:"footwear"},{key:"B",text:"football"},{key:"C",text:"footnote"},{key:"D",text:"footprint"}], correctAnswer: "D", discussion: "Istilah lingkungan yang umum adalah 'ecological footprint' (jejak ekologis)." },

            // PART 4: Reading Comprehension (Questions 23-30)
            { id: 23, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "The Silent Valley was a place of absolute serenity, untouched by the noisy machinery of the modern world. It provided a perfect escape for those weary of city life.", question: "What is the main characteristic of the Silent Valley according to the text?", options: [{key:"A",text:"It is highly industrialized."},{key:"B",text:"It is extremely peaceful and quiet."},{key:"C",text:"It is a crowded tourist spot."},{key:"D",text:"It is full of modern machinery."}], correctAnswer: "B", discussion: "Teks menyebutkan 'absolute serenity' dan 'untouched by noisy machinery', yang menegaskan bahwa tempat itu sangat damai dan tenang." },
            { id: 24, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "It provided a perfect escape for those weary of city life.", question: "The word 'weary' in the passage is closest in meaning to...", options: [{key:"A",text:"Tired"},{key:"B",text:"Excited"},{key:"C",text:"Afraid"},{key:"D",text:"Fond"}], correctAnswer: "A", discussion: "'Weary' berarti kelelahan secara fisik atau mental, sinonim yang paling tepat adalah 'Tired'." },
            { id: 25, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "The only sounds were the rustling of leaves and the occasional call of a distant bird.", question: "What can be heard in the Silent Valley?", options: [{key:"A",text:"Cars honking"},{key:"B",text:"People talking loudly"},{key:"C",text:"Construction work"},{key:"D",text:"Nature sounds like leaves and birds"}], correctAnswer: "D", discussion: "Kalimat secara eksplisit menyatakan suara yang terdengar hanyalah gesekan daun ('rustling of leaves') dan kicauan burung ('call of a distant bird')." },
            { id: 26, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "The Silent Valley was a place of absolute serenity, untouched by the noisy machinery of the modern world.", question: "What does the word 'untouched' imply in this context?", options: [{key:"A",text:"Nobody has ever been there."},{key:"B",text:"It is protected by the government."},{key:"C",text:"It remains natural and unspoiled by modern technology."},{key:"D",text:"It is a dangerous place to visit."}], correctAnswer: "C", discussion: "'Untouched' di sini bermakna belum terjamah atau belum dirusak oleh teknologi modern (machinery)." },
            { id: 27, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "It provided a perfect escape for those weary of city life.", question: "Why do people likely visit the Silent Valley?", options: [{key:"A",text:"To find a job."},{key:"B",text:"To escape the stress of the city."},{key:"C",text:"To buy machinery."},{key:"D",text:"To build houses."}], correctAnswer: "B", discussion: "Teks menyebutkan tempat itu adalah 'perfect escape' (pelarian yang sempurna) bagi mereka yang lelah dengan kehidupan kota." },
            { id: 28, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "The Silent Valley was a place of absolute serenity...", question: "What is the tone of the author in describing the valley?", options: [{key:"A",text:"Critical"},{key:"B",text:"Anxious"},{key:"C",text:"Appreciative and calm"},{key:"D",text:"Sarcastic"}], correctAnswer: "C", discussion: "Penulis menggunakan kata-kata positif seperti 'absolute serenity' dan 'perfect escape', menunjukkan nada yang mengapresiasi dan tenang." },
            { id: 29, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "Many conservationists argue that such environments must be protected for future generations to experience.", question: "What is the author's likely purpose for including this statement?", options: [{key:"A",text:"To persuade readers to protect natural places."},{key:"B",text:"To complain about future generations."},{key:"C",text:"To explain how to plant trees."},{key:"D",text:"To advertise a tourist resort."}], correctAnswer: "A", discussion: "Menyebutkan pendapat aktivis konservasi tentang perlindungan lingkungan bertujuan untuk membujuk pembaca agar peduli pada pelestarian alam." },
            { id: 30, part: "Part 4: Reading Comprehension", passageTitle: "The Silent Valley", passageText: "Ultimately, places like the Silent Valley remind us of our deep connection to nature.", question: "What is the main conclusion of the passage?", options: [{key:"A",text:"Nature is dangerous."},{key:"B",text:"Cities are better than valleys."},{key:"C",text:"We should destroy machinery."},{key:"D",text:"Natural places hold significant value for humanity's connection to the earth."}], correctAnswer: "D", discussion: "Kesimpulannya adalah tempat-tempat alami ini berharga karena mengingatkan kita pada koneksi kita dengan alam (nature)." }
        ];

        const container = document.getElementById('quiz-container');
        const finishBtn = document.getElementById('finish-btn');
        let userAnswers = {}; // Objek untuk menyimpan jawaban user

        // Fungsi untuk merender soal
        function renderQuiz() {
            questionsData.forEach((q, index) => {
                const questionHTML = `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 mb-8 transition hover:shadow-md" id="question-card-${q.id}">
                        <div class="flex justify-between items-center mb-5">
                            <span class="inline-block bg-blue-100 text-blue-800 text-xs px-3 py-1.5 rounded-full font-bold tracking-wide uppercase">
                                ${q.part}
                            </span>
                            <span class="text-gray-400 font-bold text-sm">Question ${index + 1} of 30</span>
                        </div>
                        
                        <div class="bg-gray-50 p-5 rounded-xl border-l-4 border-blue-500 mb-6">
                            <h3 class="font-bold text-gray-800 mb-2">${q.passageTitle}</h3>
                            <p class="text-gray-600 text-lg leading-relaxed">"${q.passageText}"</p>
                        </div>

                        <div class="mb-5">
                            <p class="font-semibold text-lg text-gray-800"><span class="text-blue-600 mr-1">${index + 1}.</span> ${q.question}</p>
                        </div>

                        <div class="space-y-3" id="options-${q.id}">
                            ${q.options.map(opt => `
                                <button onclick="checkAnswer(${q.id}, '${opt.key}', '${q.correctAnswer}')" 
                                        class="option-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-blue-400 hover:bg-blue-50 focus:outline-none flex items-center justify-between group"
                                        id="btn-${q.id}-${opt.key}">
                                    <span class="text-gray-700 group-hover:text-blue-800"><span class="font-extrabold mr-3 text-gray-500 group-hover:text-blue-600">${opt.key}.</span> ${opt.text}</span>
                                    <span class="icon-container hidden"></span>
                                </button>
                            `).join('')}
                        </div>

                        <!-- Area Pembahasan -->
                        <div id="discussion-${q.id}" class="hidden mt-6 p-5 bg-blue-50 border border-blue-100 rounded-xl">
                            <h4 class="font-bold text-blue-800 mb-2 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Pembahasan
                            </h4>
                            <p class="text-gray-700 text-sm md:text-base leading-relaxed">${q.discussion}</p>
                        </div>
                    </div>
                `;
                container.innerHTML += questionHTML;
            });
        }

        // Fungsi untuk mengecek jawaban
        function checkAnswer(questionId, selectedKey, correctKey) {
            // Jika sudah dijawab, jangan lakukan apa-apa
            if (userAnswers[questionId]) return;

            const optionsContainer = document.getElementById(`options-${questionId}`);
            const buttons = optionsContainer.querySelectorAll('button');
            const discussionBox = document.getElementById(`discussion-${questionId}`);

            // Simpan jawaban (True jika benar, False jika salah)
            userAnswers[questionId] = (selectedKey === correctKey);

            // Tampilkan tombol "Selesai" jika minimal 1 soal sudah dijawab
            finishBtn.classList.remove('hidden');

            buttons.forEach(btn => {
                btn.classList.add('disabled');
                
                const icon = btn.querySelector('.icon-container');
                icon.classList.remove('hidden');

                const currentBtnKey = btn.id.split('-').pop();

                if (currentBtnKey === correctKey) {
                    btn.classList.add('correct');
                    icon.innerHTML = `<svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                } else if (currentBtnKey === selectedKey && selectedKey !== correctKey) {
                    btn.classList.add('incorrect');
                    icon.innerHTML = `<svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                }
            });

            // Tampilkan kotak pembahasan
            discussionBox.classList.remove('hidden');
            discussionBox.classList.add('animate-pulse');
            setTimeout(() => discussionBox.classList.remove('animate-pulse'), 500);
        }

        // Fungsi Menampilkan Skor Akhir
        function showScore() {
            let correctCount = 0;
            const totalQuestions = questionsData.length;
            const answeredCount = Object.keys(userAnswers).length;

            // Hitung jawaban benar
            for (const key in userAnswers) {
                if (userAnswers[key] === true) {
                    correctCount++;
                }
            }

            // Hitung nilai (Skala 100)
            const score = Math.round((correctCount / totalQuestions) * 100);

            // Peringatan jika belum dijawab semua (opsional)
            if (answeredCount < totalQuestions) {
                const proceed = confirm(`Kamu baru menjawab ${answeredCount} dari ${totalQuestions} soal. Yakin ingin melihat nilai sekarang? Soal yang belum dijawab akan dihitung salah.`);
                if (!proceed) return;
            }

            // Update UI Modal
            document.getElementById('final-score-text').innerText = score;
            document.getElementById('final-fraction').innerText = `${correctCount} Benar dari ${totalQuestions} Soal`;
            
            // Tampilkan Modal
            const modal = document.getElementById('score-modal');
            modal.classList.remove('hidden');
            
            // Animasi Bar
            setTimeout(() => {
                document.getElementById('score-card').classList.remove('scale-95');
                document.getElementById('score-card').classList.add('scale-100');
                document.getElementById('score-bar').style.width = `${score}%`;
                
                // Ubah warna bar berdasarkan skor
                if(score < 50) document.getElementById('score-bar').className = "bg-red-500 h-4 rounded-full transition-all duration-1000";
                else if(score < 80) document.getElementById('score-bar').className = "bg-yellow-400 h-4 rounded-full transition-all duration-1000";
                else document.getElementById('score-bar').className = "bg-green-500 h-4 rounded-full transition-all duration-1000";
            }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('score-modal');
            document.getElementById('score-card').classList.remove('scale-100');
            document.getElementById('score-card').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        // Inisialisasi tampilan
        window.onload = renderQuiz;
    </script>
