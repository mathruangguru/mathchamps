            border-radius: 8px;
            border: 1px solid #eee;
            margin: 15px 0;
            display: block;
            background: #fdfdfd;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .opt-item {

            border-radius: 10px;
            border: 2px solid #eee;
            font-size: 1rem;
        }

        .opt-item.is-answer {

            border-color: var(--correct);
            color: #155724;
            font-weight: bold;
        }

        .img-error {

            border: 1px dashed var(--wrong);
            padding: 10px;
            background: #fff0f0;
            border-radius: 5px;
            font-size: 0.9rem;
            margin: 10px 0;

        { text: "Perhatikan gambar. Berapakah hasil perkalian tersebut?", options: ["3,471,732", "3,371,732", "3,321,732", "3,321,232", "3,331,731"], answer: 1 },
        { text: "Perhatikan gambar. Berapakah hasil pembagian tersebut?", options: ["2", "4", "5", "7", "6"], answer: 3 }
    ];

    const container = document.getElementById('questionsContainer');
    const alphabet = ['A', 'B', 'C', 'D', 'E'];

    rawData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'q-card';

        // Gabungkan teks dengan gambar yang sesuai urutan
        const fullText = `${q.text}<br><img src='${images[index]}' class='q-img' alt='Soal ${index + 1}'>`;

        const optList = q.options.map((opt, optIdx) => {
            const isCorrect = optIdx === q.answer;
            return `<li class="opt-item ${isCorrect ? 'is-answer' : ''}"><strong>${alphabet[optIdx]}.)</strong> ${opt}</li>`;
        }).join('');

        card.innerHTML = `
            <div class="q-meta">
                <span>Soal ${index + 1}</span>
                <span>${levels[index]}</span>
            </div>
            <div class="q-text">${fullText}</div>
            <ul class="options-list">
                ${optList}
            </ul>
        `;
        container.appendChild(card);
    });

    // Handle Error Gambar
    window.addEventListener('load', () => {
        const imgs = document.getElementsByTagName('img');
        for (let img of imgs) {
            img.onerror = function() {
                this.style.display = 'none';
                const errText = document.createElement('div');
                errText.className = 'img-error';
                errText.innerText = '(Link Gambar Rusak)';
                this.parentNode.insertBefore(errText, this);
            };
        }
        
        // Render Math notations
        renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ]
        });
    });
</script>

</body>
</html>
