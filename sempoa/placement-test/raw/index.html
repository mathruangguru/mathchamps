        }

            position: relative;

            height: auto;
            border-radius: 8px;
            border: 1px solid #eee;
            margin: 15px 0;
            display: block;
            background: #fdfdfd;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .opt-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #eee;
            font-size: 1rem;
        }

        .opt-item.is-answer {
            background: #d4edda;
            border-color: var(--correct);
            color: #155724;
            font-weight: bold;
        }

        .img-error {
            color: var(--wrong);
            font-style: italic;
            border: 1px dashed var(--wrong);
            padding: 10px;
            background: #fff0f0;
            border-radius: 5px;
            font-size: 0.9rem;
            margin: 10px 0;
        }

        @media (max-width: 600px) {
            .options-list {

    rawData.forEach((q, index) => {
        const card = document.createElement('div');

        // Gabungkan teks dengan gambar yang sesuai urutan
        const fullText = `${q.text}<br><img src='${images[index]}' class='q-img' alt='Soal ${index + 1}'>`;

        const optList = q.options.map((opt, optIdx) => {
            const isCorrect = optIdx === q.answer;
            return `<li class="opt-item ${isCorrect ? 'is-answer' : ''}"><strong>${alphabet[optIdx]}.)</strong> ${opt}</li>`;
        }).join('');

        card.innerHTML = `
            <div class="q-meta">

                <span>${levels[index]}</span>
            </div>
            <div class="q-text">${fullText}</div>
            <ul class="options-list">
                ${optList}
            </ul>

    // Handle Error Gambar dan Eksekusi MathJax
    window.addEventListener('load', () => {
        const imgs = document.getElementsByTagName('img');
        for (let img of imgs) {
            img.onerror = function() {
                this.style.display = 'none';
                const errText = document.createElement('div');
                errText.className = 'img-error';
                errText.innerText = '(Link Gambar Rusak)';
                this.parentNode.insertBefore(errText, this);
            };
        }
        
        // Render Math notations
        renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ]
        });
