    <style>
        :root {
            --primary: #FF9F1C;
            --dark: #011627;
            --light: #f0f8ff;
            --correct: #27ae60;
            --wrong: #c0392b;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--light);
            color: #2c3e50;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            border-bottom: 3px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 40px;
            font-size: 1.8rem;
        }

        .q-card {
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            background: #fff;
            position: relative;
            transition: transform 0.2s;
        }

        .q-meta {
            font-size: 0.85rem;
            font-weight: 800;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .q-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #eee;
            margin: 15px 0;
            display: block;
            background: #fdfdfd;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .opt-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #eee;
            font-size: 1rem;
        }

        .opt-item.is-answer {
            background: #d4edda;
            border-color: var(--correct);
            color: #155724;
            font-weight: bold;
        }

        .img-error {
            color: var(--wrong);
            font-style: italic;
            border: 1px dashed var(--wrong);
            padding: 10px;
            background: #fff0f0;
            border-radius: 5px;
            font-size: 0.9rem;
            margin: 10px 0;
        }

        @media (max-width: 600px) {
            .options-list {
                grid-template-columns: 1fr;
            }
            body { padding: 10px; }
            .container { padding: 15px; }
        }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .q-card { break-inside: avoid; border: 1px solid #ccc; margin-bottom: 20px; }
        }
    </style>
</head>

        ...Array(5).fill("Junior 1"), ...Array(5).fill("Junior 2"), ...Array(5).fill("Junior 3"), ...Array(5).fill("Junior 4"),
        ...Array(5).fill("Starter 1"), ...Array(5).fill("Starter 2"), ...Array(5).fill("Starter 3"), ...Array(5).fill("Starter 4"),
        ...Array(5).fill("Builder 1"), ...Array(5).fill("Builder 2"), ...Array(5).fill("Builder 3"), ...Array(5).fill("Builder 4"),
        ...Array(5).fill("Master 1"), ...Array(5).fill("Master 2"), ...Array(5).fill("Master 3"), ...Array(5).fill("Master 4")
    ];

    // MENGHAPUS SEMUA TEKS SOAL LAMA
    const rawData = Array.from({ length: 80 }, () => ({
        text: "Perhatikan gambar berikut untuk menjawab soal:",
        options: ["Pilihan A", "Pilihan B", "Pilihan C", "Pilihan D", "Pilihan E"],
        answer: 0 // Default jawaban disetel ke A (0)
    }));

    const container = document.getElementById('questionsContainer');
    const alphabet = ['A', 'B', 'C', 'D', 'E'];

    rawData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'q-card';

        /* Gabungkan teks dengan gambar yang sesuai urutan */
        const fullText = `${q.text}<br><img src='${images[index]}' class='q-img' alt='Gambar'>`;

        const optList = q.options.map((opt, optIdx) => {
            const isCorrect = optIdx === q.answer;
            return `<li class="opt-item ${isCorrect ? 'is-answer' : ''}"><strong>${alphabet[optIdx]}.)</strong> ${opt}</li>`;
        }).join('');

        card.innerHTML = `
            <div class="q-meta">
                <span>${levels[index]}</span>
            </div>
            <div class="q-text">${fullText}</div>
            <ul class="options-list">
                ${optList}
            </ul>
        `;
        container.appendChild(card);
    });

    /* Handle Error Gambar dan Eksekusi MathJax */
    window.addEventListener('load', () => {
        const imgs = document.getElementsByTagName('img');
        for (let img of imgs) {
            img.onerror = function() {
                this.style.display = 'none';
                const errText = document.createElement('div');
                errText.className = 'img-error';
                errText.innerText = '(Link Gambar Rusak)';
                this.parentNode.insertBefore(errText, this);
            };
        }
        
        // Render Math notations
        renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ]
        });
    });
